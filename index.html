<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>CodeBlock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <aside class="leftPanel">
            <button class="blockTool" id="varDecl" draggable="true">Add Variable</button>
            <button class="blockTool" id="assign" draggable="true">Assign</button>
        </aside>

        <main class="mainArea">
            <header class="topBar">
                <button id="runBtn">RUN</button>
            </header>

            <section class="workspace">
                <div class="canvas" id="canvas"></div>
            </section>
        </main>

        <aside class="rightPanel">
            <h3>Logs</h3>
            <div id="logContent"></div>
        </aside>
    </div>

    <script src="script.js"></script>
    <script src="dragndrop.js"></script>
</body>

</html>

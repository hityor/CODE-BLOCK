<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CodeBlock</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <aside class="leftPanel">
        <div class="blockTool" id="varDecl" draggable="true">Add Variable</div>
        <div class="blockTool" id="assign" draggable="true">Assign</div>
        <div class="blockTool" id="arith" draggable="true">Arithmetic</div>
        <div class="blockTool" id="varGet" draggable="true">Get Value</div>
        <div class="blockTool" id="arrayDecl" draggable="true">Array Decl</div>
        <div class="blockTool" id="arrayGet" draggable="true">Array Get</div>
        <div class="blockTool" id="arraySet" draggable="true">Array Set</div>
        <div class="blockTool" id="compare" draggable="true">Compare</div>
        <div class="blockTool" id="if" draggable="true">If</div>
        <div class="blockTool" id="while" draggable="true">While</div>
      </aside>

      <main class="mainArea">
        <header class="topBar">
          <button id="runBtn">RUN</button>
        </header>

        <section class="workspace">
          <div class="canvas" id="canvas"></div>
        </section>
      </main>

      <aside class="rightPanel">
        <h3>Logs</h3>
        <div id="logContent"></div>
      </aside>
    </div>

    <script src="./dist/interpreter.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
